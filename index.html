<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肥爷专业颜值评定</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f4f7; }
    .card { background: white; border-radius: 32px; box-shadow: 0 25px 60px rgba(0,0,0,0.1); }
    .upload-area { border: 3px dashed #ddd; transition: 0.3s; position: relative; }
    .upload-area:hover { border-color: #ff9500; background: #fffcf5; }
    .loader { border-top-color: #ff9500; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen py-10 px-4">
  <div class="max-w-xl mx-auto">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900">肥爷专业颜值评定</h1>
      <p class="text-[#ff9500] font-medium mt-2">Gemini 1.5 Flash 强力驱动</p>
    </div>

    <div class="card p-8">
      <!-- 上传初始界面 -->
      <div id="uploadArea" class="upload-area rounded-3xl h-72 flex flex-col items-center justify-center cursor-pointer">
        <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-300 mb-4"></i>
        <p class="text-xl font-bold text-gray-700">点击这里上传照片</p>
        <p class="text-xs text-gray-400 mt-2">支持拖拽图片</p>
        <!-- 核心修复：确保 input 在这里 -->
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
      </div>

      <!-- 结果展示界面 -->
      <div id="resultArea" class="hidden text-center">
        <div class="flex justify-center mb-6">
          <img id="preview" class="max-h-72 rounded-2xl shadow-md object-cover">
        </div>
        
        <div id="loadingStatus">
          <div class="loader rounded-full border-4 border-gray-100 h-10 w-10 mx-auto mb-4"></div>
          <p class="text-gray-500">正在接入 Gemini 分析中...</p>
        </div>

        <div id="scoreBox" class="hidden">
          <div id="score" class="text-7xl font-black text-[#ff9500] mb-1">0.0</div>
          <div id="tier" class="text-2xl font-bold text-gray-800 mb-4">---</div>
          <div class="bg-gray-50 p-4 rounded-2xl text-gray-600 italic text-sm border-l-4 border-[#ff9500]" id="reason">---</div>
        </div>

        <button onclick="window.location.reload()" class="mt-8 w-full py-4 bg-gray-900 text-white rounded-2xl font-bold hover:bg-black transition">
          重新测一张
        </button>
      </div>
    </div>
  </div>

  <script>
    // 你的 API Key
    const API_KEY = "AIzaSyCYIUCL34jstGhx3rzR7Vre7uDbpsqJH1g";

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');

    // 修复点击逻辑：确保点击区域能触发文件选择
    uploadArea.onclick = () => {
      console.log("点击了上传区域"); // 调试用
      fileInput.click();
    };

    async function analyzeImage(base64) {
      // 使用最稳妥的 v1 路径
      const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: "你是一位严苛的审美鉴定专家。请对这张照片打分（0-10）并给出犀利评价。必须只返回如下JSON格式：{\"score\": 6.5, \"tier\": \"中等水平\", \"reason\": \"评价内容\"}" },
              { inline_data: { mime_type: "image/jpeg", data: base64 } }
            ]
          }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || "请求失败");

      let text = data.candidates[0].content.parts[0].text;
      // 这里的正则处理是为了防止 AI 返回 ```json ... 
``` 导致解析失败
      const jsonMatch = text.match(/\{.*\}/s);
      if (!jsonMatch) throw new Error("无法解析 AI 返回的数据");
      return JSON.parse(jsonMatch[0]);
    }

    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(',')[1];
        document.getElementById('preview').src = ev.target.result;
        
        // 界面切换
        uploadArea.classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('loadingStatus').classList.remove('hidden');
        document.getElementById('scoreBox').classList.add('hidden');

        try {
          const res = await analyzeImage(base64);
          document.getElementById('loadingStatus').classList.add('hidden');
          document.getElementById('scoreBox').classList.remove('hidden');
          
          document.getElementById('score').innerText = res.score;
          document.getElementById('tier').innerText = res.tier;
          document.getElementById('reason').innerText = `"${res.reason}"`;
        } catch (err) {
          document.getElementById('loadingStatus').innerHTML = `
            <p class="text-red-500 font-bold">鉴定失败</p>
            <p class="text-xs text-gray-400 mt-2">${err.message}</p>
          `;
          console.error(err);
        }
      };
      reader.readAsDataURL(file);
    };

    // 拖拽支持
    uploadArea.ondragover = (e) => { e.preventDefault(); uploadArea.style.borderColor = "#ff9500"; };
    uploadArea.ondragleave = () => { uploadArea.style.borderColor = "#ddd"; };
    uploadArea.ondrop = (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = "#ddd";
      if (e.dataTransfer.files[0]) {
        fileInput.files = e.dataTransfer.files;
        fileInput.dispatchEvent(new Event('change'));
      }
    };
  </script>
</body>
</html>
