<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肥爷专业颜值评定</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: sans-serif; background: #f4f4f7; }
    .card { background: white; border-radius: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); }
    /* 核心修复：确保 label 覆盖整个区域，实现 100% 点击响应 */
    .upload-label { 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      width: 100%; height: 100%; cursor: pointer; border: 3px dashed #ddd; border-radius: 24px;
      transition: 0.3s;
    }
    .upload-label:hover { border-color: #ff9500; background: #fffcf5; }
    .loader { border-top-color: #ff9500; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen py-10 px-4">
  <div class="max-w-xl mx-auto">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold">肥爷专业颜值评定</h1>
      <p class="text-[#ff9500] font-medium mt-2">Gemini 1.5 Flash 引擎</p>
    </div>

    <div class="card p-8">
      <!-- 上传区：使用 label 包裹 input 是最稳妥的点击触发方式 -->
      <div id="uploadContainer" class="h-72">
        <label for="fileInput" class="upload-label">
          <i class="fa-solid fa-cloud-arrow-up text-5xl text-gray-300 mb-4"></i>
          <p class="text-xl font-bold text-gray-700">点击此处选择照片</p>
          <p class="text-xs text-gray-400 mt-2">支持拖拽图片直接上传</p>
          <input type="file" id="fileInput" accept="image/*" class="hidden">
        </label>
      </div>

      <!-- 结果展示区 -->
      <div id="resultArea" class="hidden text-center">
        <div class="flex justify-center mb-6">
          <img id="preview" class="max-h-72 rounded-2xl shadow-md object-cover">
        </div>
        
        <div id="loadingStatus">
          <div class="loader rounded-full border-4 border-gray-100 h-10 w-10 mx-auto mb-4"></div>
          <p class="text-gray-500">正在接入 Gemini 分析中...</p>
        </div>

        <div id="scoreBox" class="hidden">
          <div id="finalScore" class="text-7xl font-black text-[#ff9500] mb-1">0.0</div>
          <div id="finalTier" class="text-2xl font-bold text-gray-800 mb-4">---</div>
          <div class="bg-gray-50 p-4 rounded-2xl text-gray-600 italic text-sm border-l-4 border-[#ff9500]" id="finalReason">---</div>
        </div>

        <button onclick="window.location.reload()" class="mt-8 w-full py-4 bg-gray-900 text-white rounded-2xl font-bold transition">
          重新测一张
        </button>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = "AIzaSyCYIUCL34jstGhx3rzR7Vre7uDbpsqJH1g";

    const fileInput = document.getElementById('fileInput');
    const uploadContainer = document.getElementById('uploadContainer');

    async function analyzeImage(base64) {
      // 路径采用最兼容的 v1 版本
      const url = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: "你是一位审美鉴定专家。请对照片打分(0-10)并简述理由。只返回JSON: {\"score\": 7.0, \"tier\": \"xxx\", \"reason\": \"xxx\"}" },
              { inline_data: { mime_type: "image/jpeg", data: base64 } }
            ]
          }]
        })
      });

      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || "请求失败");

      const text = data.candidates[0].content.parts[0].text;
      const jsonMatch = text.match(/\{.*\}/s);
      if (!jsonMatch) throw new Error("无法解析结果");
      return JSON.parse(jsonMatch[0]);
    }

    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (ev) => {
        const base64 = ev.target.result.split(',')[1];
        document.getElementById('preview').src = ev.target.result;
        
        uploadContainer.classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');

        try {
          const res = await analyzeImage(base64);
          document.getElementById('loadingStatus').classList.add('hidden');
          document.getElementById('scoreBox').classList.remove('hidden');
          
          document.getElementById('finalScore').innerText = res.score;
          document.getElementById('finalTier').innerText = res.tier;
          document.getElementById('finalReason').innerText = `"${res.reason}"`;
        } catch (err) {
          document.getElementById('loadingStatus').innerHTML = `
            <p class="text-red-500 font-bold">鉴定失败</p>
            <p class="text-xs mt-1 text-gray-500">${err.message}</p>
          `;
        }
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
