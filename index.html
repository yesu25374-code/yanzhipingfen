<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>肥爷专业颜值评定 · 修复卡顿版</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a1e2b 0%, #0c0f17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(22, 26, 38, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,150,0.2);
            overflow: hidden;
        }
        .header {
            background: #000000aa;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 2px solid #f5b642;
        }
        .header h1 {
            margin: 0;
            font-size: 1.9rem;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .header p {
            margin: 0.5rem 0 0;
            color: #cccbc8;
            font-size: 0.85rem;
        }
        .sub {
            color: #f5b642;
            font-weight: bold;
        }
        .content {
            padding: 2rem;
        }
        .upload-area {
            background: #2a2f3f;
            border: 2px dashed #f5b64288;
            border-radius: 2rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1.8rem;
        }
        .upload-area:hover {
            background: #353c4e;
            border-color: #f5b642;
        }
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .upload-text {
            color: #ddd;
            font-weight: 500;
        }
        #fileInput {
            display: none;
        }
        .preview-container {
            text-align: center;
            margin-bottom: 1.5rem;
            background: #00000033;
            border-radius: 2rem;
            padding: 1rem;
            display: none;
        }
        canvas {
            max-width: 100%;
            border-radius: 1.5rem;
            background: #1e212c;
        }
        .result-panel {
            background: #0f111acc;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1.2rem;
            display: none;
        }
        .score-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid #f5b64255;
            padding-bottom: 0.8rem;
        }
        .total-score {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F9E0A0, #E6A017);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .rank {
            background: #f5b64222;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #ffd58c;
            font-weight: bold;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .detail-item {
            background: #1e1f2c;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            font-size: 0.9rem;
        }
        .detail-label {
            color: #b9b9d0;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .detail-value {
            font-weight: bold;
            color: #FFD966;
            font-size: 1.2rem;
        }
        .comment {
            background: #00000066;
            border-left: 5px solid #f5b642;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            color: #f0ede8;
            margin-top: 1rem;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: bold;
            color: #1e1e2a;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcd7e;
            transform: scale(0.98);
        }
        .loader {
            background: #00000077;
            text-align: center;
            padding: 1rem;
            border-radius: 2rem;
            margin: 1rem 0;
            color: #f5b642;
            display: none;
        }
        .error-message {
            background: #ff444422;
            border: 1px solid #ff8888;
            color: #ffbb99;
            padding: 0.8rem;
            border-radius: 1rem;
            margin: 1rem 0;
            text-align: center;
            display: none;
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #7e7e8c;
            border-top: 1px solid #ffffff15;
        }
        @media (max-width: 550px) {
            .content { padding: 1.2rem; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🐻 肥爷专业颜值评定</h1>
        <p>洞穿虚假展示面 · <span class="sub">素颜看上限</span> · 高P看底线</p>
        <p style="font-size:0.7rem; margin-top:6px;">🔧 修复卡顿版 | 超时自动报错</p>
    </div>
    <div class="content">
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">点击上传正脸照片 (无美颜最佳)</div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
        </div>
        <div class="preview-container" id="previewArea">
            <canvas id="resultCanvas" width="500" height="400" style="width:100%; height:auto;"></canvas>
        </div>
        <div class="loader" id="loaderMsg">⏳ 正在加载AI模型，请稍等...</div>
        <div class="error-message" id="errorMsg"></div>
        <div class="result-panel" id="resultPanel">
            <div class="score-section">
                <span class="total-score" id="totalScore">--</span>
                <span class="rank" id="rankTag">等待评定</span>
            </div>
            <div class="detail-grid">
                <div class="detail-item"><div class="detail-label">三庭均衡指数</div><div class="detail-value" id="sanTing">-</div></div>
                <div class="detail-item"><div class="detail-label">五眼黄金分</div><div class="detail-value" id="wuYan">-</div></div>
                <div class="detail-item"><div class="detail-label">轮廓对称度</div><div class="detail-value" id="symmetry">-</div></div>
                <div class="detail-item"><div class="detail-label">唇鼻下颌协调</div><div class="detail-value" id="harmony">-</div></div>
            </div>
            <div class="comment" id="commentBox"></div>
            <div style="text-align: right; margin-top: 8px;">
                <button id="resetBtn">重新评定</button>
            </div>
        </div>
        <div class="footer">
            ※ 本地AI分析，不上传任何图片 · 如卡住请换一张正脸清晰照
        </div>
    </div>
</div>

<script>
    (function(){
        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const resultCanvas = document.getElementById('resultCanvas');
        const loaderMsg = document.getElementById('loaderMsg');
        const errorMsgDiv = document.getElementById('errorMsg');
        const resultPanel = document.getElementById('resultPanel');
        const resetBtn = document.getElementById('resetBtn');
        
        const totalScoreSpan = document.getElementById('totalScore');
        const rankTagSpan = document.getElementById('rankTag');
        const sanTingSpan = document.getElementById('sanTing');
        const wuYanSpan = document.getElementById('wuYan');
        const symmetrySpan = document.getElementById('symmetry');
        const harmonySpan = document.getElementById('harmony');
        const commentBoxDiv = document.getElementById('commentBox');

        let modelsLoaded = false;
        let currentImage = null;
        let detectTimeout = null;

        // 显示错误并自动复位
        function showError(msg, autoReset = true) {
            errorMsgDiv.innerText = msg;
            errorMsgDiv.style.display = 'block';
            loaderMsg.style.display = 'none';
            if (autoReset) {
                setTimeout(() => {
                    resetAll();
                }, 3000);
            }
        }

        function hideError() {
            errorMsgDiv.style.display = 'none';
        }

        function resetAll() {
            if (detectTimeout) clearTimeout(detectTimeout);
            fileInput.value = '';
            previewArea.style.display = 'none';
            resultPanel.style.display = 'none';
            loaderMsg.style.display = 'none';
            hideError();
            currentImage = null;
            uploadArea.style.display = 'block';
            const ctx = resultCanvas.getContext('2d');
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
        }

        // 加载模型 (加入超时)
        async function loadModels() {
            loaderMsg.style.display = 'block';
            loaderMsg.innerText = '🔥 加载颜值分析核心模型 (TinyFaceDetector + 68点)...';
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
                await Promise.all([
                    faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL)
                ]);
                modelsLoaded = true;
                loaderMsg.style.display = 'none';
                console.log("模型就绪");
            } catch(e) {
                console.error(e);
                showError('❌ 模型加载失败，请检查网络后刷新页面重试。', false);
                loaderMsg.style.display = 'none';
            }
        }

        // 上传图片
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleImageUpload);
        resetBtn.addEventListener('click', resetAll);

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            hideError();
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = async () => {
                URL.revokeObjectURL(url);
                currentImage = img;
                uploadArea.style.display = 'none';
                previewArea.style.display = 'block';
                resultPanel.style.display = 'none';
                loaderMsg.style.display = 'block';
                loaderMsg.innerText = '🧐 肥爷鉴定中: 扫描面部特征点 (请保证正脸清晰)...';
                
                // 设置canvas尺寸
                let width = img.width;
                let height = img.height;
                const maxSize = 600;
                if(width > maxSize) {
                    height = (height * maxSize) / width;
                    width = maxSize;
                }
                resultCanvas.width = width;
                resultCanvas.height = height;
                const ctx = resultCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                if(!modelsLoaded) {
                    await loadModels();
                    if(!modelsLoaded) return;
                }
                
                // 设定超时 (5秒)
                if(detectTimeout) clearTimeout(detectTimeout);
                detectTimeout = setTimeout(() => {
                    loaderMsg.style.display = 'none';
                    showError('⏰ 检测超时：未检测到清晰正脸，请尝试光线充足、无遮挡、正脸平视的照片。', true);
                }, 8000);
                
                try {
                    // 增加检测参数：提高输入尺寸
                    const detections = await faceapi.detectSingleFace(resultCanvas, 
                        new faceapi.TinyFaceDetectorOptions({ inputSize: 512, scoreThreshold: 0.5 })
                    ).withFaceLandmarks();
                    
                    clearTimeout(detectTimeout);
                    
                    if(!detections) {
                        throw new Error("未检测到人脸，请确保照片为正脸且面部清晰可见");
                    }
                    const landmarks = detections.landmarks;
                    drawLandmarks(ctx, landmarks.positions);
                    const scores = calculateBeautyScores(landmarks, width, height);
                    displayResult(scores);
                    loaderMsg.style.display = 'none';
                    resultPanel.style.display = 'block';
                } catch(err) {
                    clearTimeout(detectTimeout);
                    console.error(err);
                    loaderMsg.style.display = 'none';
                    let errorText = err.message || "人脸检测失败";
                    if(errorText.includes("Cannot read properties") || errorText.includes("undefined")) {
                        errorText = "图片中未检测到完整面部特征点，请尝试更清晰的正脸照";
                    }
                    showError(`⚠️ 评定失败: ${errorText} · 建议换一张素颜正脸照`, true);
                }
            };
            img.src = url;
        }
        
        function drawLandmarks(ctx, points) {
            ctx.strokeStyle = '#ffcc55';
            ctx.fillStyle = '#ffaa33';
            ctx.lineWidth = 2;
            for(let p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, 2*Math.PI);
                ctx.fill();
                ctx.stroke();
            }
        }
        
        // 颜值算法（与之前一致，但确保健壮）
        function calculateBeautyScores(landmarks, imgW, imgH) {
            const pts = landmarks.positions;
            if(!pts || pts.length < 68) return getDefaultFallback();
            
            const dist = (a,b) => Math.hypot(pts[a].x - pts[b].x, pts[a].y - pts[b].y);
            const getY = (idx) => pts[idx].y;
            const getX = (idx) => pts[idx].x;
            
            // 三庭粗略计算
            let nasion = 27, noseBottom = 33, chin = 8;
            let upperFace = Math.abs(pts[nasion].y - (pts[19].y-5));
            let midFace = Math.abs(pts[noseBottom].y - pts[nasion].y);
            let lowerFace = Math.abs(pts[chin].y - pts[noseBottom].y);
            let totalFace = upperFace+midFace+lowerFace;
            let idealRatio = 1/3;
            let sanTingScore = Math.max(0, 100 - Math.abs((upperFace/totalFace - idealRatio))*200 
                                        - Math.abs((midFace/totalFace - idealRatio))*200 
                                        - Math.abs((lowerFace/totalFace - idealRatio))*180);
            sanTingScore = Math.min(98, Math.max(50, sanTingScore));
            
            // 五眼
            let leftEyeOuter = 36, leftEyeInner = 39, rightEyeInner = 42, rightEyeOuter = 45;
            let eyeWidthL = dist(leftEyeOuter, leftEyeInner);
            let eyeWidthR = dist(rightEyeInner, rightEyeOuter);
            let interEyeDist = dist(leftEyeInner, rightEyeInner);
            let faceWidth = dist(0, 16);
            let idealEyeWidth = faceWidth/5;
            let eyeRatioScore = 100 - Math.abs((eyeWidthL+eyeWidthR)/2 / idealEyeWidth -1)*90;
            let interEyeRatio = 100 - Math.abs(interEyeDist / idealEyeWidth - 1)*70;
            let wuYanScore = (eyeRatioScore*0.6 + interEyeRatio*0.4);
            wuYanScore = Math.min(99, Math.max(45, wuYanScore));
            
            // 对称度
            let leftEyeCenterX = (getX(36)+getX(39))/2, rightEyeCenterX = (getX(42)+getX(45))/2;
            let eyeSym = 100 - Math.abs((leftEyeCenterX - rightEyeCenterX) / (faceWidth/4))*80;
            let mouthLeft = pts[48], mouthRight=pts[54];
            let mouthSym = 100 - Math.abs((mouthLeft.y - mouthRight.y))/3;
            let jawSym = 100 - Math.abs((pts[2].y - pts[14].y))/5;
            let symmetryScore = (eyeSym*0.5 + mouthSym*0.3 + jawSym*0.2);
            symmetryScore = Math.min(98, Math.max(40, symmetryScore));
            
            // 唇鼻协调
            let noseBottomY = pts[33].y, upperLipY = pts[51].y;
            let philtrumLength = Math.abs(upperLipY - noseBottomY);
            let lowerLipY = pts[57].y, chinY = pts[8].y;
            let chinLength = Math.abs(lowerLipY - chinY);
            let lipRatio = 100 - Math.abs(philtrumLength/chinLength - 0.8)*100;
            let harmonyScore = (sanTingScore*0.3 + wuYanScore*0.3 + symmetryScore*0.2 + lipRatio*0.2);
            harmonyScore = Math.min(99, harmonyScore);
            
            let finalScore = (sanTingScore*0.25 + wuYanScore*0.3 + symmetryScore*0.25 + harmonyScore*0.2);
            finalScore = Math.floor(Math.min(99.5, Math.max(35, finalScore)));
            
            let rank = "", comment = "";
            if(finalScore >= 92) { rank = "仙品 · 素颜天花板"; comment = "骨相皮相俱佳，三庭五眼接近黄金分割。";}
            else if(finalScore >= 85) { rank = "神颜预备役"; comment = "上镜优势明显，素颜状态能打。";}
            else if(finalScore >= 78) { rank = "清秀佳人/才子"; comment = "五官和谐耐看，注意表情管理。";}
            else if(finalScore >= 68) { rank = "氛围潜力股"; comment = "特色明显，找到合适的风格能大幅提升。";}
            else { rank = "凡人璞玉"; comment = "面部比例有调整空间，自信才是终极滤镜。";}
            
            return {
                total: finalScore,
                rank: rank,
                sanTing: Math.round(sanTingScore),
                wuYan: Math.round(wuYanScore),
                symmetry: Math.round(symmetryScore),
                harmony: Math.round(harmonyScore),
                comment: comment + ` 【素颜上限 ${Math.min(99, finalScore+6)} · 高P底线 ${Math.max(45, finalScore-12)}】`
            };
        }
        
        function getDefaultFallback() {
            return {
                total: 72,
                rank: "检测偏差 · 参考分",
                sanTing: 70,
                wuYan: 68,
                symmetry: 71,
                harmony: 73,
                comment: "面部特征点未完全捕获，请正脸平视重试。"
            };
        }
        
        function displayResult(scores) {
            totalScoreSpan.innerText = scores.total;
            rankTagSpan.innerText = scores.rank;
            sanTingSpan.innerText = scores.sanTing;
            wuYanSpan.innerText = scores.wuYan;
            symmetrySpan.innerText = scores.symmetry;
            harmonySpan.innerText = scores.harmony;
            commentBoxDiv.innerHTML = `💬 ${scores.comment}`;
        }
        
        loadModels();
    })();
</script>
</body>
</html>
