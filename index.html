<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肥爷专业颜值评定</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, sans-serif; background: #f0f2f5; }
    .card { background: white; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .drop-zone { 
      border: 3px dashed #d1d5db; border-radius: 16px; height: 260px; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      cursor: pointer; transition: 0.2s;
    }
    .drop-zone:hover { border-color: #ff9500; background: #fffcf0; }
    .loader { border-top-color: #ff9500; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen py-10 px-4">
  <div class="max-w-xl mx-auto">
    <div class="text-center mb-6">
      <h1 class="text-3xl font-bold text-gray-800">肥爷专业颜值评定</h1>
      <p class="text-[#ff9500] font-semibold">Gemini 1.5 Flash 驱动</p>
    </div>

    <div class="card p-6">
      <div id="initView">
        <label for="fileInput" class="drop-zone">
          <i class="fa-solid fa-camera text-5xl text-gray-300 mb-4"></i>
          <span class="text-lg font-bold text-gray-600">点击上传照片</span>
          <input type="file" id="fileInput" accept="image/*" class="hidden">
        </label>
      </div>

      <div id="resultView" class="hidden text-center">
        <img id="preview" class="max-h-64 rounded-xl mx-auto mb-6 shadow-md">
        <div id="loadingBox">
          <div class="loader rounded-full border-4 border-gray-100 h-10 w-10 mx-auto mb-4"></div>
          <p class="text-gray-500 font-medium">肥爷正在鉴定...</p>
        </div>
        <div id="resultContent" class="hidden">
          <div id="resScore" class="text-6xl font-black text-[#ff9500] mb-2">0.0</div>
          <div id="resTier" class="text-xl font-bold text-gray-800 mb-4">--</div>
          <div id="resReason" class="bg-gray-50 p-4 rounded-xl text-gray-600 italic text-sm border-l-4 border-[#ff9500]">--</div>
        </div>
        <button onclick="location.reload()" class="mt-8 w-full py-4 bg-gray-900 text-white rounded-xl font-bold">测下一张</button>
      </div>
    </div>
  </div>

  <script>
    // 请在此处填入你新生成的 API Key
    const API_KEY = "请填入你的新API_KEY";

    document.getElementById('fileInput').onchange = function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async function(ev) {
        document.getElementById('initView').classList.add('hidden');
        document.getElementById('resultView').classList.remove('hidden');
        document.getElementById('preview').src = ev.target.result;

        try {
          // 核心修正：使用最新的模型标识符 gemini-1.5-flash-latest
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY}`;
          
          const resp = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { text: "你是一位极其严格的颜值鉴定专家。请对照片打分(0.0-10.0)并给出简短毒舌评价。必须只返回JSON格式，不要带Markdown标签：{\"score\": 6.5, \"tier\": \"路人\", \"reason\": \"评价\"}" },
                  { inline_data: { mime_type: "image/jpeg", data: ev.target.result.split(',')[1] } }
                ]
              }]
            })
          });

          const data = await resp.json();
          if (!resp.ok) throw new Error(data.error?.message || "连接失败");

          const json = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|
```/g, "").trim());
          document.getElementById('loadingBox').classList.add('hidden');
          document.getElementById('resultContent').classList.remove('hidden');
          document.getElementById('resScore').innerText = json.score;
          document.getElementById('resTier').innerText = json.tier;
          document.getElementById('resReason').innerText = `"${json.reason}"`;
        } catch (err) {
          document.getElementById('loadingBox').innerHTML = `<p class="text-red-500 font-bold">出错: ${err.message}</p>`;
        }
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
