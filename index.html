<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>肥爷专业颜值评定 · 素颜看上限 · 高P看底线</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a1e2b 0%, #0c0f17 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Inter', sans-serif;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 720px;
            width: 100%;
            background: rgba(22, 26, 38, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,215,150,0.2);
            overflow: hidden;
            transition: all 0.2s ease;
        }
        .header {
            background: #000000aa;
            padding: 1.5rem 2rem;
            text-align: center;
            border-bottom: 2px solid #f5b642;
        }
        .header h1 {
            margin: 0;
            font-size: 1.9rem;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #FFD966, #FFB347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 2px 3px rgba(0,0,0,0.3);
        }
        .header p {
            margin: 0.5rem 0 0;
            color: #cccbc8;
            font-style: italic;
            font-size: 0.85rem;
        }
        .sub {
            color: #f5b642;
            font-weight: bold;
        }
        .content {
            padding: 2rem;
        }
        .upload-area {
            background: #2a2f3f;
            border: 2px dashed #f5b64288;
            border-radius: 2rem;
            padding: 2rem 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 1.8rem;
        }
        .upload-area:hover {
            background: #353c4e;
            border-color: #f5b642;
        }
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }
        .upload-text {
            color: #ddd;
            font-weight: 500;
        }
        #fileInput {
            display: none;
        }
        .preview-container {
            text-align: center;
            margin-bottom: 1.5rem;
            position: relative;
            background: #00000033;
            border-radius: 2rem;
            padding: 1rem;
        }
        canvas {
            max-width: 100%;
            border-radius: 1.5rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            background: #1e212c;
        }
        .result-panel {
            background: #0f111acc;
            border-radius: 2rem;
            padding: 1.5rem;
            margin-top: 1.2rem;
            backdrop-filter: blur(4px);
        }
        .score-section {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 1.2rem;
            border-bottom: 1px solid #f5b64255;
            padding-bottom: 0.8rem;
        }
        .total-score {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #F9E0A0, #E6A017);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .rank {
            background: #f5b64222;
            padding: 0.3rem 1rem;
            border-radius: 40px;
            color: #ffd58c;
            font-weight: bold;
        }
        .detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 1rem;
        }
        .detail-item {
            background: #1e1f2c;
            padding: 0.6rem 1rem;
            border-radius: 1.2rem;
            font-size: 0.9rem;
        }
        .detail-label {
            color: #b9b9d0;
            font-size: 0.7rem;
            text-transform: uppercase;
        }
        .detail-value {
            font-weight: bold;
            color: #FFD966;
            font-size: 1.2rem;
        }
        .comment {
            background: #00000066;
            border-left: 5px solid #f5b642;
            padding: 0.8rem 1rem;
            border-radius: 1rem;
            font-size: 0.9rem;
            color: #f0ede8;
            margin-top: 1rem;
        }
        .loader {
            display: none;
            text-align: center;
            margin: 0.5rem 0;
            color: #f5b642;
        }
        button {
            background: #f5b642;
            border: none;
            padding: 10px 18px;
            border-radius: 60px;
            font-weight: bold;
            color: #1e1e2a;
            cursor: pointer;
            margin-top: 8px;
            transition: 0.2s;
        }
        button:hover {
            background: #ffcd7e;
            transform: scale(0.98);
        }
        .footer {
            font-size: 0.7rem;
            text-align: center;
            padding: 1rem;
            color: #7e7e8c;
            border-top: 1px solid #ffffff15;
        }
        @media (max-width: 550px) {
            .content { padding: 1.2rem; }
            .detail-grid { grid-template-columns: 1fr; }
        }
    </style>
    <!-- 加载 face-api.js 核心库 -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.2.0/dist/tf-core.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-converter@4.2.0/dist/tf-converter.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection@0.0.3/dist/face-landmarks-detection.min.js"></script>
    <!-- 备用方案：由于 face-api.js 更成熟，改用 face-api.js 方便人脸68点检测，上面 tf 系列用于后续但改用 classic face-api -->
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>🐻 肥爷专业颜值评定</h1>
        <p>洞穿虚假展示面 · <span class="sub">素颜看上限</span> · 高P看底线</p>
        <p style="font-size:0.7rem; margin-top:6px;">⚡ 基于面部黄金比例 & 5官对称算法 (本地模型)</p>
    </div>
    <div class="content">
        <div class="upload-area" id="uploadArea">
            <div class="upload-icon">📸</div>
            <div class="upload-text">点击上传正脸照片 (无美颜最佳)</div>
            <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">
        </div>
        <div class="preview-container" id="previewArea" style="display: none;">
            <canvas id="resultCanvas" width="500" height="400" style="width:100%; height:auto;"></canvas>
        </div>
        <div class="loader" id="loaderMsg">🧠 脂肪AI正在分析骨骼比例 & 对称性 ... 请稍后</div>
        <div class="result-panel" id="resultPanel" style="display: none;">
            <div class="score-section">
                <span class="total-score" id="totalScore">--</span>
                <span class="rank" id="rankTag">等待评定</span>
            </div>
            <div class="detail-grid">
                <div class="detail-item"><div class="detail-label">三庭均衡指数</div><div class="detail-value" id="sanTing">-</div></div>
                <div class="detail-item"><div class="detail-label">五眼黄金分</div><div class="detail-value" id="wuYan">-</div></div>
                <div class="detail-item"><div class="detail-label">轮廓对称度</div><div class="detail-value" id="symmetry">-</div></div>
                <div class="detail-item"><div class="detail-label">唇鼻下颌协调</div><div class="detail-value" id="harmony">-</div></div>
            </div>
            <div class="comment" id="commentBox">
                等待上传...
            </div>
            <div style="text-align: right; margin-top: 8px;">
                <button id="resetBtn">重新评定</button>
            </div>
        </div>
        <div class="footer">
            ※ 本地AI分析，不上传任何图片 · 仅作娱乐参考，素颜天花板由你定义
        </div>
    </div>
</div>

<script>
    (function(){
        // DOM 元素
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const previewArea = document.getElementById('previewArea');
        const resultCanvas = document.getElementById('resultCanvas');
        const loaderMsg = document.getElementById('loaderMsg');
        const resultPanel = document.getElementById('resultPanel');
        const resetBtn = document.getElementById('resetBtn');
        
        // 显示结果DOM
        const totalScoreSpan = document.getElementById('totalScore');
        const rankTagSpan = document.getElementById('rankTag');
        const sanTingSpan = document.getElementById('sanTing');
        const wuYanSpan = document.getElementById('wuYan');
        const symmetrySpan = document.getElementById('symmetry');
        const harmonySpan = document.getElementById('harmony');
        const commentBoxDiv = document.getElementById('commentBox');

        let modelsLoaded = false;
        let currentImage = null;

        // 加载 face-api 模型 (轻量化)
        async function loadModels() {
            loaderMsg.style.display = 'block';
            loaderMsg.innerText = '🔥 加载颜值分析核心模型 (人脸检测+68点特征)...';
            try {
                // 官方模型地址使用 CDN 镜像
                const MODEL_URL = 'https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@0.22.2/weights';
                await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
                await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                modelsLoaded = true;
                loaderMsg.style.display = 'none';
                console.log("肥爷AI模型就位");
            } catch(e) {
                console.error(e);
                loaderMsg.innerHTML = '❌ 模型加载失败，请检查网络后刷新重试。 (需访问cdn)';
                setTimeout(()=>{
                    loaderMsg.style.display = 'none';
                }, 3000);
            }
        }

        // 触发上传
        uploadArea.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', handleImageUpload);
        resetBtn.addEventListener('click', () => {
            // 重置界面
            fileInput.value = '';
            previewArea.style.display = 'none';
            resultPanel.style.display = 'none';
            currentImage = null;
            const ctx = resultCanvas.getContext('2d');
            ctx.clearRect(0, 0, resultCanvas.width, resultCanvas.height);
            uploadArea.style.display = 'block';
        });

        async function handleImageUpload(e) {
            const file = e.target.files[0];
            if(!file) return;
            const img = new Image();
            const url = URL.createObjectURL(file);
            img.onload = async () => {
                URL.revokeObjectURL(url);
                currentImage = img;
                uploadArea.style.display = 'none';
                previewArea.style.display = 'block';
                resultPanel.style.display = 'none';
                loaderMsg.style.display = 'block';
                loaderMsg.innerText = '🧐 肥爷鉴定中: 扫描面部特征点...';
                
                // 设定canvas尺寸比例
                const maxSize = 600;
                let width = img.width;
                let height = img.height;
                if(width > maxSize) {
                    height = (height * maxSize) / width;
                    width = maxSize;
                }
                resultCanvas.width = width;
                resultCanvas.height = height;
                const ctx = resultCanvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                // 调用 face-api 检测
                if(!modelsLoaded) {
                    await loadModels();
                }
                try {
                    const detections = await faceapi.detectSingleFace(resultCanvas, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks();
                    if(!detections) {
                        throw new Error("未检测到清晰正脸，请尝试光线充足、面部无遮挡的照片");
                    }
                    const landmarks = detections.landmarks;
                    // 绘制关键点
                    const landmarksArray = landmarks.positions;
                    drawLandmarks(ctx, landmarksArray);
                    
                    // 计算颜值指标 (模拟专业但基于真·几何特征)
                    const scores = calculateBeautyScores(landmarks, width, height);
                    displayResult(scores);
                    loaderMsg.style.display = 'none';
                    resultPanel.style.display = 'block';
                } catch(err) {
                    loaderMsg.innerHTML = `⚠️ 评定失败: ${err.message} · 请上传正脸/素颜清晰照`;
                    setTimeout(()=>{
                        loaderMsg.style.display = 'none';
                        resetBtn.click();
                    }, 2000);
                }
            };
            img.src = url;
        }
        
        function drawLandmarks(ctx, points) {
            ctx.strokeStyle = '#ffcc55';
            ctx.fillStyle = '#ffaa33';
            ctx.lineWidth = 2;
            for(let p of points) {
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2.5, 0, 2*Math.PI);
                ctx.fill();
                ctx.stroke();
            }
            // 简单连轮廓示意（下巴到脸颊就不做太复杂）
        }
        
        // 核心颜值算法（基于三庭、眼距、对称）
        function calculateBeautyScores(landmarks, imgW, imgH) {
            // landmarks.positions 共68点: 0-16 下颌轮廓; 17-21左眉;22-26右眉;27-35鼻梁;36-41左眼;42-47右眼;48-60嘴外;61-67嘴内
            const pts = landmarks.positions;
            if(!pts || pts.length < 68) return getDefaultFallback();
            
            // 辅助函数: 两点欧氏距离
            const dist = (a,b) => Math.hypot(pts[a].x - pts[b].x, pts[a].y - pts[b].y);
            const getY = (idx) => pts[idx].y;
            const getX = (idx) => pts[idx].x;
            
            // 三庭指数: 眉心(27)到鼻尖(30) 对比 发际线? 使用眉间(27)到鼻下(33)为上中庭，鼻下(33)到下巴(8)为下庭
            let nasion = 27;    // 鼻根点
            let noseTip = 30;   // 鼻尖
            let noseBottom = 33; // 鼻下点
            let chin = 8;       // 下巴尖
            let foreheadY = pts[nasion].y - (pts[nasion].y - pts[19].y)*0.6; //模拟额头发际无法精确，假设上庭用鼻根到眉心上方
            
            let upperFace = Math.abs(pts[nasion].y - (pts[19].y-5)); // 粗略上庭
            let midFace = Math.abs(pts[noseBottom].y - pts[nasion].y);
            let lowerFace = Math.abs(pts[chin].y - pts[noseBottom].y);
            let totalFace = upperFace+midFace+lowerFace;
            let idealRatio = 1/3;
            let sanTingScore = Math.max(0, 100 - Math.abs((upperFace/totalFace - idealRatio))*200 
                                        - Math.abs((midFace/totalFace - idealRatio))*200 
                                        - Math.abs((lowerFace/totalFace - idealRatio))*180);
            sanTingScore = Math.min(98, Math.max(50, sanTingScore));
            
            // 五眼: 眼裂宽度和眼距(左外眼角到右外眼角为5等份) 取左眼外眼角(36左外? 36左外，39左内，42右外，45右内)
            let leftEyeOuter = 36, leftEyeInner = 39;
            let rightEyeInner = 42, rightEyeOuter = 45;
            let eyeWidthL = dist(leftEyeOuter, leftEyeInner);
            let eyeWidthR = dist(rightEyeInner, rightEyeOuter);
            let interEyeDist = dist(leftEyeInner, rightEyeInner);
            let faceWidth = dist(0, 16); // 轮廓宽度
            let idealEyeWidth = faceWidth/5; // 理论单眼宽占1/5
            let eyeRatioScore = 100 - Math.abs((eyeWidthL+eyeWidthR)/2 / idealEyeWidth -1)*90;
            let interEyeRatio = 100 - Math.abs(interEyeDist / idealEyeWidth - 1)*70;
            let wuYanScore = (eyeRatioScore*0.6 + interEyeRatio*0.4);
            wuYanScore = Math.min(99, Math.max(45, wuYanScore));
            
            // 对称度: 左眼右眼关键点坐标差异, 左嘴角(48) 右嘴角(54)对称性
            let leftEyeCenterX = (getX(36)+getX(39))/2, rightEyeCenterX = (getX(42)+getX(45))/2;
            let eyeSym = 100 - Math.abs((leftEyeCenterX - rightEyeCenterX) / (faceWidth/4))*80;
            let mouthLeft = pts[48], mouthRight=pts[54];
            let mouthSym = 100 - Math.abs((mouthLeft.y - mouthRight.y))/3;
            let jawSym = 100 - Math.abs((pts[2].y - pts[14].y))/5;
            let symmetryScore = (eyeSym*0.5 + mouthSym*0.3 + jawSym*0.2);
            symmetryScore = Math.min(98, Math.max(40, symmetryScore));
            
            // 唇鼻下颌协调: 人中+颌面角度估算,鼻唇角等
            let noseTipY = pts[30].y, upperLipY = pts[51].y;
            let philtrumLength = Math.abs(upperLipY - noseBottom);
            let lowerLipY = pts[57].y;
            let chinLength = Math.abs(lowerLipY - pts[8].y);
            let lipRatio = 100 - Math.abs(philtrumLength/chinLength - 0.8)*100;
            let harmonyScore = (sanTingScore*0.3 + wuYanScore*0.3 + symmetryScore*0.2 + lipRatio*0.2);
            harmonyScore = Math.min(99, harmonyScore);
            
            // 综合总分: 权重自定义
            let finalScore = (sanTingScore*0.25 + wuYanScore*0.3 + symmetryScore*0.25 + harmonyScore*0.2);
            finalScore = Math.floor(Math.min(99.5, Math.max(35, finalScore)));
            
            // 评语&上下限模拟
            let comment = "";
            let rank = "";
            if(finalScore >= 92) { rank = "仙品 · 素颜天花板"; comment = "骨相皮相俱佳，三庭五眼接近黄金分割。建议保持自然，高P反而拉低辨识度。";}
            else if(finalScore >= 85) { rank = "神颜预备役"; comment = "上镜优势明显，素颜状态能打。微调睡姿与神态即可突破90+。";}
            else if(finalScore >= 78) { rank = "清秀佳人/才子"; comment = "五官和谐耐看，注意表情管理与发型修饰，瞬间提升一个段位。";}
            else if(finalScore >= 68) { rank = "氛围潜力股"; comment = "特色明显，找到合适的风格（妆造/角度）能掩盖微小不对称。";}
            else { rank = "凡人璞玉"; comment = "面部比例有调整空间，但自信与气场才是终极滤镜。肥爷提醒：健康自然即是高级。";}
            
            let sanTingFixed = Math.round(sanTingScore);
            let wuYanFixed = Math.round(wuYanScore);
            let symFixed = Math.round(symmetryScore);
            let harmFixed = Math.round(harmonyScore);
            
            return {
                total: finalScore,
                rank: rank,
                sanTing: sanTingFixed,
                wuYan: wuYanFixed,
                symmetry: symFixed,
                harmony: harmFixed,
                comment: comment + " 【素颜上限 "+Math.min(99, finalScore+6)+" · 高P底线 "+Math.max(45, finalScore-12)+"】"
            };
        }
        
        function getDefaultFallback() {
            return {
                total: 72,
                rank: "检测偏差 · 参考分",
                sanTing: 70,
                wuYan: 68,
                symmetry: 71,
                harmony: 73,
                comment: "面部特征点未能完全捕获，请正脸、平视镜头重试。肥爷赠标准分72。"
            };
        }
        
        function displayResult(scores) {
            totalScoreSpan.innerText = scores.total;
            rankTagSpan.innerText = scores.rank;
            sanTingSpan.innerText = scores.sanTing;
            wuYanSpan.innerText = scores.wuYan;
            symmetrySpan.innerText = scores.symmetry;
            harmonySpan.innerText = scores.harmony;
            commentBoxDiv.innerHTML = `💬 ${scores.comment}`;
        }
        
        // 预加载模型
        loadModels();
    })();
</script>
</body>
</html>
