<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肥爷专业颜值评定 - Gemini版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f2f5; }
    .card { background: white; border-radius: 32px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); }
    .upload-area { border: 3px dashed #e5e5e5; transition: all 0.3s ease; }
    .upload-area:hover { border-color: #ff9500; background: #fffcf5; }
    .loader { border-top-color: #ff9500; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen py-12 px-4">
  <div class="max-w-xl mx-auto">
    <div class="text-center mb-10">
      <h1 class="text-4xl font-bold tracking-tight text-gray-900">肥爷专业颜值评定</h1>
      <p class="text-[#ff9500] font-semibold text-lg mt-2">洞穿虚假展示面 · 严格审美鉴定</p>
    </div>

    <div class="card p-8">
      <!-- 上传区 -->
      <div id="uploadArea" class="upload-area rounded-3xl h-72 flex flex-col items-center justify-center cursor-pointer">
        <i class="fa-solid fa-camera-retro text-6xl text-gray-300 mb-4"></i>
        <p class="text-xl font-medium text-gray-700">点击上传或拖拽照片</p>
        <p class="text-sm text-gray-400 mt-2">Gemini 1.5 Flash 强力驱动</p>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <!-- 结果展示区 -->
      <div id="resultArea" class="hidden">
        <div class="flex justify-center mb-6">
          <img id="preview" class="max-h-80 rounded-2xl shadow-lg object-cover">
        </div>
        
        <div id="loading" class="text-center py-4">
          <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-100 h-12 w-12 mx-auto mb-4"></div>
          <p class="text-gray-500 font-medium">肥爷正在毒舌分析中...</p>
        </div>

        <div id="scoreDisplay" class="hidden text-center">
          <div id="finalScore" class="text-7xl font-black text-[#ff9500] mb-2">0.0</div>
          <div id="finalTier" class="text-2xl font-bold text-gray-800 mb-4">等级加载中</div>
          <div class="bg-gray-50 p-4 rounded-2xl text-gray-600 italic border-l-4 border-[#ff9500]" id="finalReason">
            评价加载中...
          </div>
        </div>

        <button onclick="location.reload()" class="mt-8 w-full py-4 bg-gray-900 hover:bg-black text-white rounded-2xl text-lg font-bold transition">
          重新测一张
        </button>
      </div>
    </div>
    <p class="text-center text-gray-400 text-xs mt-8">注：API请求需网络环境支持访问 Google 服务</p>
  </div>

  <script>
    // 已根据你的截图更新 API Key
    const API_KEY = "AIzaSyCYIUCL34jstGhx3rzR7Vre7uDbpsqJH1g";

    async function analyzeImage(base64Data) {
      const prompt = `你是一位极度毒舌、审美严苛的亚洲颜值鉴定专家。
      请分析照片中的人物打分并给出评价：
      1. 分数(score): 0.0-10.0，保留一位小数。极难拿到8分以上。
      2. 等级(tier): 如"路人乙"、"氛围感美女"、"骨相神颜"等。
      3. 理由(reason): 犀利、直接，指出骨相或五官的优缺点，不要客套。
      
      请必须只返回 JSON 格式，不要有任何 Markdown 标记，格式如下：
      {"score": 6.5, "tier": "xxx", "reason": "xxx"}`;

      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{
            parts: [
              { text: prompt },
              { inline_data: { mime_type: "image/jpeg", data: base64Data } }
            ]
          }],
          generationConfig: {
            responseMimeType: "application/json"
          }
        })
      });

      const resData = await response.json();
      if (resData.error) throw new Error(resData.error.message);
      
      const textResult = resData.candidates[0].content.parts[0].text;
      return JSON.parse(textResult);
    }

    const fileInput = document.getElementById('fileInput');
    const uploadArea = document.getElementById('uploadArea');

    uploadArea.onclick = () => fileInput.click();

    fileInput.onchange = async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      // 预览并切换界面
      const reader = new FileReader();
      reader.onload = async (event) => {
        const base64 = event.target.result.split(',')[1];
        document.getElementById('preview').src = event.target.result;
        document.getElementById('uploadArea').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');

        try {
          const result = await analyzeImage(base64);
          
          document.getElementById('loading').classList.add('hidden');
          document.getElementById('scoreDisplay').classList.remove('hidden');
          
          document.getElementById('finalScore').innerText = result.score;
          document.getElementById('finalTier').innerText = result.tier;
          document.getElementById('finalReason').innerText = `"${result.reason}"`;
        } catch (err) {
          alert("鉴定失败: " + err.message + "\n请检查网络是否能访问Google API");
          console.error(err);
        }
      };
      reader.readAsDataURL(file);
    };
  </script>
</body>
</html>
