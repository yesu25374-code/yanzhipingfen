<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>肥爷专业颜值评定</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f8f8f8; }
    .card { background: white; border-radius: 32px; box-shadow: 0 30px 80px rgba(0,0,0,0.09); }
    .upload-area { border: 3px dashed #e5e5e5; transition: all 0.4s; }
    .upload-area.dragover { border-color: #ff9500; background: #fffaf0; }
  </style>
</head>
<body class="min-h-screen py-16 px-4">
  <div class="max-w-2xl mx-auto">
    <div class="text-center mb-12">
      <h1 class="text-5xl font-semibold tracking-tighter text-[#1d1d1f]">肥爷专业颜值评定</h1>
      <p class="text-[#ff9500] font-medium text-xl tracking-wide mt-3">
        洞穿虚假展示面 · 素颜看上限 · 高P看底线
      </p>
    </div>

    <div class="card p-10">
      <div id="uploadArea" class="upload-area rounded-3xl h-80 flex flex-col items-center justify-center cursor-pointer">
        <i class="fa-solid fa-cloud-arrow-up text-7xl text-gray-300 mb-6"></i>
        <p class="text-2xl font-medium text-[#1d1d1f]">点击或拖拽照片上传</p>
        <p class="text-gray-500 mt-3">正脸照最佳（光线均匀、无重度美颜）</p>
        <input type="file" id="fileInput" accept="image/*" class="hidden">
      </div>

      <div id="resultArea" class="hidden">
        <div class="flex justify-center mb-8">
          <img id="preview" class="max-h-96 rounded-3xl shadow-2xl object-cover">
        </div>
        <div id="message" class="mb-6 text-center"></div>
        <div id="scoreArea" class="hidden text-center"></div>

        <!-- 颜值提升建议 -->
        <div id="suggestionArea" class="hidden mt-8 p-6 bg-gray-50 rounded-2xl text-left">
          <div class="font-semibold text-[#1d1d1f] mb-3 flex items-center gap-2">
            <i class="fa-solid fa-lightbulb text-[#ff9500]"></i>
            <span>肥爷颜值提升建议</span>
          </div>
          <div id="suggestionText" class="text-sm text-gray-600 leading-relaxed"></div>
        </div>

        <button onclick="analyzeAgain()" class="mt-12 w-full py-6 bg-[#1d1d1f] hover:bg-black text-white rounded-3xl text-lg font-medium">
          继续测下一张
        </button>
      </div>
    </div>

    <!-- 免责声明 -->
    <div class="mt-10 text-center text-xs text-gray-400 max-w-xl mx-auto leading-relaxed">
      本网站专注为素人颜值测评 所以七八分基本绝迹 虽能做到最大可能严格客观测评颜值，但毕竟不是万用真理。<br>
      不同的状态、光照、角度都会让分数偶有差异，仅供参考即可。<br><br>
      如果想知道自己的颜值上限，尽管拿出自己最精致的照片。<br>
      不要拿自己的素颜照来挑战严格的AI算法，结果大概不会让你开心。
    </div>
  </div>

  <script>
    const API_KEY = "SFZAf7IRd2JE8coJ6t0gDWI2";
    const SECRET_KEY = "929KQWuNSm5FJscMpvSTmEvFal7nNiJp";
    const PROXY = "https://corsproxy.io/?";
    let accessToken = null;

    async function getToken() {
      if (accessToken) return accessToken;
      const url = `https://aip.baidubce.com/oauth/2.0/token?grant_type=client_credentials&client_id=${API_KEY}&client_secret=${SECRET_KEY}`;
      const res = await fetch(PROXY + encodeURIComponent(url));
      const data = await res.json();
      if (!data.access_token) throw new Error("获取 Token 失败");
      accessToken = data.access_token;
      return accessToken;
    }

    async function analyzeWithBaidu(base64) {
      const token = await getToken();
      const apiUrl = `https://aip.baidubce.com/rest/2.0/face/v3/detect?access_token=${token}`;
      const response = await fetch(PROXY + encodeURIComponent(apiUrl), {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          image: base64,
          image_type: "BASE64",
          face_field: "beauty,age,gender"
        })
      });
      const data = await response.json();
      if (data.error_code) throw new Error(`检测错误：${data.error_msg}`);
      if (!data.result?.face_list?.length) throw new Error("未检测到人脸，请换一张正脸照试试");
      return data.result.face_list[0];
    }

    // ==================== 稳定版映射（已移除随机）====================
    // 同一张照片无论测多少次，结果完全一致
    function getFinalScore(b) {
      let score;

      if (b >= 95) {
        score = 8.6 + (b - 95) * 0.12;
      } else if (b >= 90) {
        score = 8.1 + (b - 90) * 0.10;
      } else if (b >= 85) {
        score = 7.6 + (b - 85) * 0.10;
      } else if (b >= 80) {
        score = 7.0 + (b - 80) * 0.12;   // 80以上直接7+
      } else if (b >= 75) {
        score = 6.5 + (b - 75) * 0.10;
      } else if (b >= 70) {
        score = 6.0 + (b - 70) * 0.10;
      } else if (b >= 60) {
        score = 5.3 + (b - 60) * 0.08;
      } else if (b >= 50) {
        score = 4.6 + (b - 50) * 0.07;
      } else {
        score = 3.8 + (b / 50) * 0.8;
      }

      // 已移除随机扰动，保证同一张照片结果完全一致
      score = Math.round(score * 10) / 10;
      score = Math.max(2.0, Math.min(9.2, score));
      return score;
    }
    // ================================================================

    function getLabel(score) {
      if (score < 1.5) return { text: "严重畸形，干扰形象", color: "#bbb" };
      if (score < 2.0) return { text: "重大负分项，后天难以弥补", color: "#aaa" };
      if (score < 2.5) return { text: "明显发育问题（如低颌面）", color: "#999" };
      if (score < 3.0) return { text: "严重不利，多发性缺陷", color: "#888" };
      if (score < 3.5) return { text: "显著低于平均水平", color: "#777" };
      if (score < 4.2) return { text: "明显低于平均（服务行业基层常见）", color: "#666" };
      if (score < 4.8) return { text: "中位数区间，普通大众密集区", color: "#555" };
      if (score < 5.3) return { text: "中等偏上，偶有回头率", color: "#ff9500" };
      if (score < 5.7) return { text: "前10%，两性市场有明显优势", color: "#ff8800" };
      if (score < 6.2) return { text: "前2-5%，入门级帅哥美女", color: "#ff7700" };
      if (score < 6.5) return { text: "前1%，系花/系草水平", color: "#ff6600" };
      if (score < 6.9) return { text: "前0.1%，中部网红/爱豆的颜值舒适区", color: "#f05500" };
      if (score < 7.2) return { text: "前0.001%，颜霸级，街上几乎不存在", color: "#e04400" };
      if (score < 7.6) return { text: "前0.00001%，顶流idol段位", color: "#c83300" };
      if (score < 8.2) return { text: "娱乐圈天花板颜值", color: "#b02000" };
      if (score < 8.7) return { text: "百万分之一，亚洲级别稀缺", color: "#901000" };
      return { text: "传世级颜值，亚洲几十年一遇", color: "#700000" };
    }

    function getSuggestion(score) {
      if (score < 4.5) {
        return "基础提升空间很大。建议先从皮肤管理、发型和眉形开始优化。保持良好睡眠 + 规律护肤，比任何滤镜都有效。";
      } else if (score < 5.5) {
        return "属于有潜力的类型。建议研究自己的「优势五官」并强化它（比如眼睛好就学会画眼妆/戴合适眼镜）。同时注意下颌线和颈部线条。";
      } else if (score < 6.5) {
        return "颜值是你的优势。下一步可以往「精致度」发展：发型、妆容、穿搭、拍照角度和光线控制，都能让你从「好看」变成「惊艳」。";
      } else if (score < 7.5) {
        return "你已经拥有超强的颜值基础。建议把精力放在「气场」和「个人风格」上。好的状态、自信的表情、以及适合自己的高级感穿搭，会让分数继续往上走。";
      } else {
        return "颜值这条路 你已到了顶峰";
      }
    }

    async function handleFile(file) {
      const reader = new FileReader();
      reader.onload = async function(e) {
        document.getElementById('preview').src = e.target.result;
        document.getElementById('uploadArea').classList.add('hidden');
        document.getElementById('resultArea').classList.remove('hidden');
        document.getElementById('scoreArea').classList.add('hidden');
        document.getElementById('suggestionArea').classList.add('hidden');

        document.getElementById('message').innerHTML = 
          '<span class="text-gray-400 text-sm">正在调用多模态视觉大模型 + 骨相数据库进行深度分析...</span>';

        try {
          const base64 = e.target.result.split(',')[1];
          const face = await analyzeWithBaidu(base64);
          const score = getFinalScore(face.beauty);
          const label = getLabel(score);
          const gender = face.gender?.type === "male" ? "男" : "女";
          const age = face.age;
          const suggestion = getSuggestion(score);

          document.getElementById('scoreArea').innerHTML = `
            <div class="text-8xl font-bold tracking-tighter mb-1" style="color:${label.color}">${score}</div>
            <div class="text-base font-medium mb-2" style="color:${label.color}">${label.text}</div>
            <div class="text-sm text-gray-400 mb-6">肥爷综合评分（满分 8）</div>
            <div class="flex justify-center gap-8 text-sm text-gray-400">
              <span>性别：${gender}</span>
              <span>年龄：约 ${age} 岁</span>
            </div>
          `;
          document.getElementById('scoreArea').classList.remove('hidden');

          document.getElementById('suggestionText').innerHTML = suggestion;
          document.getElementById('suggestionArea').classList.remove('hidden');

          document.getElementById('message').innerHTML = '';
        } catch (err) {
          document.getElementById('message').innerHTML = `<span class="text-red-400 text-sm">⚠️ ${err.message}</span>`;
        }
      };
      reader.readAsDataURL(file);
    }

    const uploadArea = document.getElementById('uploadArea');
    const fileInput = document.getElementById('fileInput');
    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', e => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', e => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleFile(file);
    });
    fileInput.addEventListener('change', e => e.target.files[0] && handleFile(e.target.files[0]));
    function analyzeAgain() { location.reload(); }
  </script>
</body>
</html>
